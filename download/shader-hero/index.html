<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Shader Hero — utan API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Canvas där WebGL2 shadern renderas -->
  <canvas id="shader-canvas"></canvas>

  <!-- Hero-innehåll ovanpå shadern -->
  <section class="hero">
    <div class="badge"><span class="dot"></span> Byggd med ren WebGL — ingen API</div>
    <h1>Bygg <span class="gradient">flytande världar</span><br>i webbläsaren</h1>
    <p class="subtitle">
      Hela bakgrunden är en GLSL fragment shader körd på GPU:n.
      Ingen server, ingen API, inga beroenden — bara en &lt;canvas&gt; och lite matematik.
    </p>
    <div class="buttons">
      <a class="btn btn-primary" href="#">Kom igång</a>
      <a class="btn btn-secondary" href="#">Se koden</a>
    </div>
  </section>

  <div class="footer-hint">Rör musen för att påverka shadern ↺</div>

  <!-- Shader-koden körs från separat fil -->
  <script src="shader.js"></script>
</body>
</html>
