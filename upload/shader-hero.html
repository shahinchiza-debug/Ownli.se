<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Shader Hero — utan API</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #shader-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  .hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    pointer-events: none;
  }
  .badge {
    pointer-events: auto;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    padding: .4rem .9rem;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    backdrop-filter: blur(8px);
    font-size: .8rem;
    letter-spacing: .02em;
    margin-bottom: 1.5rem;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #38bdf8;
    box-shadow: 0 0 8px #38bdf8;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
  h1 {
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 1.25rem;
    text-shadow: 0 2px 30px rgba(0,0,0,.5);
  }
  h1 .gradient {
    background: linear-gradient(90deg, #fff 0%, #93c5fd 40%, #38bdf8 70%, #06b6d4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    font-size: clamp(1rem, 1.6vw, 1.25rem);
    max-width: 620px;
    color: rgba(255,255,255,.78);
    line-height: 1.55;
    margin-bottom: 2.25rem;
  }
  .buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: auto;
  }
  .btn {
    padding: .85rem 1.6rem;
    border-radius: 12px;
    font-size: .95rem;
    font-weight: 600;
    text-decoration: none;
    transition: transform .15s ease, background .15s ease;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: #fff;
    color: #000;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary {
    background: rgba(255,255,255,.06);
    color: #fff;
    border-color: rgba(255,255,255,.18);
    backdrop-filter: blur(8px);
  }
  .btn-secondary:hover { background: rgba(255,255,255,.12); transform: translateY(-2px); }
  .footer-hint {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: .75rem;
    color: rgba(255,255,255,.5);
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
  <canvas id="shader-canvas"></canvas>

  <section class="hero">
    <div class="badge"><span class="dot"></span> Byggd med ren WebGL — ingen API</div>
    <h1>Bygg <span class="gradient">flytande världar</span><br>i webbläsaren</h1>
    <p class="subtitle">
      Hela bakgrunden är en GLSL fragment shader körd på GPU:n.
      Ingen server, ingen API, inga beroenden — bara en &lt;canvas&gt; och lite matematik.
    </p>
    <div class="buttons">
      <a class="btn btn-primary" href="#">Kom igång</a>
      <a class="btn btn-secondary" href="#">Se koden</a>
    </div>
  </section>

  <div class="footer-hint">Rör musen för att påverka shadern ↺</div>

<!-- =========================================================================
   WEBGL2 SHADER HERO
   - Ingen React, ingen Vite, ingen API, inga npm-beroenden
   - Bara en HTML-fil som körs direkt i webbläsaren
   ========================================================================= -->
<script>
(function () {
  "use strict";

  // ----------------------------------------------------------------
  // 1. Hämta canvas och skapa WebGL2-kontext
  // ----------------------------------------------------------------
  const canvas = document.getElementById("shader-canvas");
  const gl = canvas.getContext("webgl2", { antialias: true, premultipliedAlpha: false });

  if (!gl) {
    document.body.innerHTML = "<p style='color:#fff;font-family:sans-serif;padding:2rem'>Din webbläsare stöder inte WebGL2.</p>";
    return;
  }

  // ----------------------------------------------------------------
  // 2. Vertex shader: ritar en "full-screen quad" (två trianglar som täcker hela skärmen)
  // ----------------------------------------------------------------
  const vertexSrc = `#version 300 es
  in vec2 position;
  void main() {
    gl_Position = vec4(position, 0.0, 1.0);
  }`;

  // ----------------------------------------------------------------
  // 3. Fragment shader: HJÄRTAT av animationen
  //    Det är här all magi sker - körs en gång per pixel på GPU:n
  // ----------------------------------------------------------------
  const fragmentSrc = `#version 300 es
  precision highp float;
  out vec4 O;

  uniform vec2  resolution;   // canvas-storlek i pixlar
  uniform float time;         // tid i sekunder
  uniform vec2  mouse;        // musposition i normaliserade koordinater
  uniform float mouseStrength;// hur mycket musen påverkar (0 = ingen, 1 = aktiv)

  #define FC gl_FragCoord.xy
  #define T  time
  #define R  resolution
  #define MN min(R.x, R.y)

  // Pseudo-random för white noise
  float rnd(vec2 p) {
    p = fract(p * vec2(12.9898, 78.233));
    p += dot(p, p + 34.56);
    return fract(p.x * p.y);
  }

  // Value noise (smooth interpolation av rnd)
  float noise(in vec2 p) {
    vec2 i = floor(p), f = fract(p), u = f * f * (3.0 - 2.0 * f);
    float a = rnd(i),
          b = rnd(i + vec2(1, 0)),
          c = rnd(i + vec2(0, 1)),
          d = rnd(i + 1.0);
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
  }

  // Fractal Brownian Motion - flera oktaver av noise staplade på varandra
  float fbm(vec2 p) {
    float t = 0.0, a = 1.0;
    mat2 m = mat2(1.0, -0.5, 0.2, 1.2);
    for (int i = 0; i < 5; i++) {
      t += a * noise(p);
      p *= 2.0 * m;
      a *= 0.5;
    }
    return t;
  }

  // Molnliknande fält
  float clouds(vec2 p) {
    float d = 1.0, t = 0.0;
    for (float i = 0.0; i < 3.0; i++) {
      float a = d * fbm(i * 10.0 + p.x * 0.2 + 0.2 * (1.0 + i) * p.y + d + i * i + p);
      t = mix(t, d, a);
      d = a;
      p *= 2.0 / (i + 1.0);
    }
    return t;
  }

  // Blå palette: djup marin -> elektrisk blå -> cyan-topp
  // Dessa tre färger mixas baserat på "bg" (moln-intensitet) och avstånd
  const vec3 DEEP   = vec3(0.02, 0.05, 0.18);   // djup marin
  const vec3 MID    = vec3(0.10, 0.35, 0.85);   // elektrisk blå
  const vec3 HIGHLIGHT = vec3(0.45, 0.80, 1.00); // ljus cyan

  void main(void) {
    vec2 uv = (FC - 0.5 * R) / MN;
    vec2 st = uv * vec2(2.0, 1.0);

    // Muspåverkan: skjuter UV-koordinaten lite åt musens håll
    vec2 mouseOffset = (mouse - 0.5) * mouseStrength * 0.4;
    st += mouseOffset;

    vec3 col = vec3(0.0);
    float bg = clouds(vec2(st.x + T * 0.5, -st.y));

    uv *= 1.0 - 0.3 * (sin(T * 0.2) * 0.5 + 0.5);

    // 12 lager av flytande, glödande former
    // Använd en blå ton i stället för originalets RGB-modulation
    for (float i = 1.0; i < 12.0; i++) {
      uv += 0.1 * cos(i * vec2(0.1 + 0.01 * i, 0.8) + i * i + T * 0.5 + 0.1 * uv.x);
      vec2 p = uv;
      float d = length(p);

      // Modulera mellan blå toner istället för regnbåge
      vec3 glowTint = mix(MID, HIGHLIGHT, 0.5 + 0.5 * sin(i));
      col += 0.00125 / d * glowTint * (cos(sin(i) * vec3(1.0, 2.0, 3.0)) + 1.0);

      float b = noise(i + p + bg * 1.731);
      col += 0.002 * b / length(max(p, vec2(b * p.x * 0.02, p.y)));

      // Mixa mot djup marin i utkanten (där d är stor)
      vec3 bgColor = mix(DEEP, MID, bg);
      col = mix(col, bgColor, d);
    }

    // Subtil vignette-rungen för biokänsla
    float vignette = smoothstep(1.4, 0.3, length((FC - 0.5 * R) / MN));
    col *= 0.6 + 0.4 * vignette;

    // Ljusare cyan-toppskärning i mitten där intensiteten är hög
    float glow = clamp(max(col.b, col.g) - col.r, 0.0, 1.0);
    col += HIGHLIGHT * glow * 0.08;

    O = vec4(col, 1.0);
  }`;

  // ----------------------------------------------------------------
  // 4. Hjälpfunktion: kompilera shader med felhantering
  // ----------------------------------------------------------------
  function compileShader(type, source) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, source);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error("Shader-fel:", gl.getShaderInfoLog(sh));
      gl.deleteShader(sh);
      return null;
    }
    return sh;
  }

  // ----------------------------------------------------------------
  // 5. Bygg program: vertex + fragment -> linkat program
  // ----------------------------------------------------------------
  const vs = compileShader(gl.VERTEX_SHADER, vertexSrc);
  const fs = compileShader(gl.FRAGMENT_SHADER, fragmentSrc);
  const program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error("Link-fel:", gl.getProgramInfoLog(program));
    return;
  }
  gl.useProgram(program);

  // ----------------------------------------------------------------
  // 6. Full-screen quad: två trianglar som täcker hela skärmen
  // ----------------------------------------------------------------
  const vertices = new Float32Array([
    -1,  1,
    -1, -1,
     1,  1,
     1, -1
  ]);
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
  const posLoc = gl.getAttribLocation(program, "position");
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  // ----------------------------------------------------------------
  // 7. Hämta uniforms (variabler vi skickar in till shadern varje frame)
  // ----------------------------------------------------------------
  const uResolution   = gl.getUniformLocation(program, "resolution");
  const uTime         = gl.getUniformLocation(program, "time");
  const uMouse        = gl.getUniformLocation(program, "mouse");
  const uMouseStrength= gl.getUniformLocation(program, "mouseStrength");

  // ----------------------------------------------------------------
  // 8. Resize-hantering (DPR-medveten)
  // ----------------------------------------------------------------
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth  * dpr;
    const h = window.innerHeight * dpr;
    canvas.width  = w;
    canvas.height = h;
    canvas.style.width  = window.innerWidth  + "px";
    canvas.style.height = window.innerHeight + "px";
    gl.viewport(0, 0, w, h);
  }
  window.addEventListener("resize", resize);
  resize();

  // ----------------------------------------------------------------
  // 9. Musinteraktion
  // ----------------------------------------------------------------
  let mouseX = 0.5, mouseY = 0.5;
  let targetMouseX = 0.5, targetMouseY = 0.5;
  let mouseStrength = 0;
  let targetStrength = 0;

  window.addEventListener("pointermove", (e) => {
    targetMouseX = e.clientX / window.innerWidth;
    targetMouseY = 1.0 - (e.clientY / window.innerHeight); // vänd Y för shader-koordinater
    targetStrength = 1.0;
  });
  window.addEventListener("pointerleave", () => { targetStrength = 0; });
  window.addEventListener("pointerout",   () => { targetStrength = 0; });

  // ----------------------------------------------------------------
  // 10. Animationsloop
  // ----------------------------------------------------------------
  const startTime = performance.now();
  function frame() {
    // Mjukt interpolation mot målvärden (easing)
    mouseX     += (targetMouseX     - mouseX)     * 0.06;
    mouseY     += (targetMouseY     - mouseY)     * 0.06;
    mouseStrength += (targetStrength - mouseStrength) * 0.05;

    const t = (performance.now() - startTime) * 0.001;

    gl.uniform2f(uResolution,   canvas.width, canvas.height);
    gl.uniform1f(uTime,         t);
    gl.uniform2f(uMouse,        mouseX, mouseY);
    gl.uniform1f(uMouseStrength, mouseStrength);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
